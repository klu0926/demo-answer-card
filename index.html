<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答案卡</title>

    <!-- Favicon (simple + reliable) -->
    <link rel="icon" href="/public/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/public/favicon.ico">

    <!-- Optional (only if you KEEP files in public folder) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png">
    <link rel="manifest" href="/public/site.webmanifest">

    <meta name="theme-color" content="#2563eb">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Playfair+Display:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 頂部導覽列 -->
    <header class="app-bar">
        <div class="app-bar-content">
            <div id="nav-left"></div>
            <div id="nav-center">
                <span class="app-logo" aria-hidden="true">
                    <img src="public/favicon-32x32.png" alt="" class="app-logo-img">
                </span>
                <h1 class="app-title" id="nav-title">答案卡</h1>
            </div>
            <div id="nav-right">
                <nav id="navbar-actions">
                    <!-- 動態生成的導覽列按鈕放這裡 -->
                </nav>
                <button class="theme-toggle" id="theme-toggle" type="button" title="切換深色模式" aria-label="切換深色模式"
                    aria-pressed="false">
                    <span class="theme-toggle-track" aria-hidden="true">
                        <i class="fa-solid fa-sun theme-toggle-icon theme-toggle-sun"></i>
                        <i class="fa-solid fa-moon theme-toggle-icon theme-toggle-moon"></i>
                        <span class="theme-toggle-thumb"></span>
                    </span>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main id="app-container">
        <!-- 頁面內容將由 JavaScript 動態寫入此處 -->
    </main>

    <!-- Modal 容器區 (供對話框使用) -->
    <div id="modal-container" class="modal-backdrop hidden"></div>

    <script src="store.js"></script>
    <script src="app.js"></script>
</body>

</html>
